<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEest Fitness & Performance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">ACE<span>est</span></div>
        <h1>Functional Fitness System</h1>
    </header>

    <main class="dashboard">
        <section class="panel client-profile">
            <div class="panel-header">
                <h2>Client Profile</h2>
            </div>
            <form id="client-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter client's name" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" min="1" placeholder="Yrs" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" step="0.1" min="1" placeholder="kg" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="program">Training Program</label>
                    <select id="program" required>
                        <option value="" disabled selected>Select a program...</option>
                        {% for key, prog in programs.items() %}
                        <option value="{{ prog.id }}">{{ prog.name }}</option>
                        {% end %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Weekly Adherence (<span id="adherence-val">0</span>%)</label>
                    <input type="range" id="progress" min="0" max="100" value="0">
                </div>

                <div class="actions">
                    <button type="submit" class="btn primary">Save Profile</button>
                    <button type="reset" class="btn secondary" id="reset-btn">Reset</button>
                </div>
            </form>
            
            <div id="save-status" class="status-message hidden">Profile saved successfully!</div>
        </section>

        <section class="panel program-details">
            <div class="panel-header">
                <h2>Program Details</h2>
            </div>
            
            <div id="empty-state" class="empty-state">
                <div class="icon">🔍</div>
                <p>Select a training program to view the weekly plan and estimated calories.</p>
            </div>

            <div id="details-content" class="details-content hidden">
                <div class="calorie-card">
                    <div class="calorie-icon">🔥</div>
                    <div class="calorie-info">
                        <h3>Estimated Calories</h3>
                        <p id="calorie-target">-- kcal / day</p>
                    </div>
                </div>

                <div class="plan-grid">
                    <div class="plan-card workout">
                        <h3>Weekly Training Plan</h3>
                        <pre id="workout-plan">--</pre>
                    </div>
                    
                    <div class="plan-card diet">
                        <h3>Nutrition Plan (TN Context)</h3>
                        <pre id="diet-plan">--</pre>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
