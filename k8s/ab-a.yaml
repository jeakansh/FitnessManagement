apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-ab-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness
      version: a
  template:
    metadata:
      labels:
        app: fitness
        version: a
    spec:
      containers:
        - name: app
          image: aceest-fitness:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000